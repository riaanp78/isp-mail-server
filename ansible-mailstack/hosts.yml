  vars:

    # ============================================
    # HAPROXY
    # Derived from inventory — never hardcode the IP here.
    # When you add a second HAProxy + Keepalived, flip to haproxy_vip.
    # ============================================
    haproxy_vip: "192.168.1.240"
    haproxy_internal_ip: "{{ hostvars[groups['haproxy_servers'][0]]['ansible_host'] }}"
    # haproxy_internal_ip: "{{ haproxy_vip }}"   # uncomment when Keepalived is active
    keepalived_auth_password: "CHANGE_ME_KEEPALIVED_PASS"

    # ============================================
    # CLAMAV
    # ============================================
    clamav_host: "{{ hostvars[groups['clamav_servers'][0]]['ansible_host'] }}"
    clamav_bind_address: "0.0.0.0"
    clamav_port: 3310
    clamav_max_file_size: 104857600
    clamav_db_update_interval: 12

    # ============================================
    # UNBOUND DNS (RSPAMD)
    # ============================================
    unbound_port: 5354
    unbound_cache_size: "512m"
    unbound_num_threads: 4
    unbound_ipv6_enabled: no
    unbound_verbosity: 1

    # ============================================
    # FEATURE TOGGLES
    # ============================================
    rspamd_enabled: true
    rspamd_clamav_enabled: true

    # ============================================
    # RSPAMD
    # ============================================
    rspamd_host: "{{ hostvars[groups['rspamd_servers'][0]]['ansible_host'] }}"
    rspamd_controller_port: 11334
    rspamd_milter_port: 11332
    rspamd_proxy_port: 11333
    rspamd_add_header_score: 3.0
    rspamd_reject_score: 15.0
    rspamd_greylist_score: 4.0

    # ============================================
    # SINGLE SOURCE OF TRUTH - Infrastructure IPs
    # Rules:
    #   - Services Roundcube talks to  → haproxy_internal_ip (load balanced)
    #   - Services that are single-node → direct IP (mysql, valkey, nfs, etc.)
    #   - Postfix/Dovecot internal ports used BY haproxy itself stay as-is
    # ============================================

    # MySQL (direct — not load balanced)
    mysql_host: "{{ hostvars[groups['mysql_servers'][0]]['ansible_host'] }}"
    mysql_port: 3306

    # Dovecot — Roundcube and Postfix connect via HAProxy
    dovecot_host: "{{ haproxy_internal_ip }}"
    dovecot_lmtp_port: 24
    dovecot_sasl_port: 12345
    dovecot_imap_port: 143
    dovecot_imaps_port: 993
    dovecot_managesieve_port: 4190

    # Postfix — Roundcube connects via HAProxy
    postfix_primary_host: "{{ haproxy_internal_ip }}"
    postfix_primary_smtp: 25
    postfix_primary_smtps: 465
    postfix_primary_submission: 587
    # Backup is also HAProxy — it will route to whichever Postfix node is healthy
    postfix_backup_host: "{{ haproxy_internal_ip }}"
    postfix_backup_smtp: 25

    # Valkey (direct — single node, HAProxy proxies on 127.0.0.1 for internal services only)
    valkey_host: "{{ hostvars[groups['valkey_servers'][0]]['ansible_host'] }}"
    valkey_port: 6379
    valkey_password: "Valkey8k7fG9xP2mQ4wR6tY3uV1nB5cX9zL0aM"
    valkey_maxmemory: "512mb"
    valkey_maxmemory_policy: "allkeys-lru"
    valkey_timeout: 300
    valkey_tcp_keepalive: 60

    # Postfixadmin (direct — single node)
    postfixadmin_host: "{{ hostvars[groups['postfixadmin_servers'][0]]['ansible_host'] }}"
    postfixadmin_port: 8080

    # NFS (direct — single node)
    nfs_host: "{{ hostvars[groups['nfs_servers'][0]]['ansible_host'] }}"
    nfs_export: "/srv/vmail"
    nfs_mount_options: "hard,intr,noatime,nordirplus,actimeo=60"

    # Mail Storage Paths
    vmail_home: "/var/vmail"
    vmail_uid: 5100
    vmail_gid: 5100
    vmail_index_path: "/var/indexes"
    vmail_volatile_path: "/dev/shm/dovecot"

    # ============================================
    # DERIVED ENDPOINTS
    # These compose the vars above — change the vars above, not these.
    # ============================================
    endpoints:
      dovecot:
        lmtp: "{{ dovecot_host }}:{{ dovecot_lmtp_port }}"
        sasl_auth: "{{ dovecot_host }}:{{ dovecot_sasl_port }}"
        imap: "{{ dovecot_host }}:{{ dovecot_imap_port }}"
        imaps: "{{ dovecot_host }}:{{ dovecot_imaps_port }}"
        managesieve: "{{ dovecot_host }}:{{ dovecot_managesieve_port }}"
      postfix:
        primary_smtp: "{{ postfix_primary_host }}:{{ postfix_primary_smtp }}"
        primary_smtps: "{{ postfix_primary_host }}:{{ postfix_primary_smtps }}"
        primary_submission: "{{ postfix_primary_host }}:{{ postfix_primary_submission }}"
        backup_smtp: "{{ postfix_backup_host }}:{{ postfix_backup_smtp }}"
      rspamd:
        controller: "{{ rspamd_host }}:{{ rspamd_controller_port }}"
        milter: "{{ rspamd_host }}:{{ rspamd_milter_port }}"
        proxy: "{{ rspamd_host }}:{{ rspamd_proxy_port }}"
      valkey:
        cache: "{{ valkey_host }}:{{ valkey_port }}"
      clamav:
        clamd: "{{ clamav_host }}:{{ clamav_port }}"
      mysql:
        host: "{{ mysql_host }}"
        port: "{{ mysql_port }}"
      roundcube:
        http: "{{ hostvars[groups['roundcube_servers'][0]]['ansible_host'] }}:80"
        servers: "{{ groups['roundcube_servers'] | map('extract', hostvars, 'ansible_host') | map('regex_replace', '^(.*)$', '\\1:80') | list }}"
      postfixadmin:
        http: "{{ postfixadmin_host }}:{{ postfixadmin_port }}"

    # ============================================
    # DATABASE
    # ============================================
    db_host: "{{ mysql_host }}"
    db_port: "{{ mysql_port }}"
    db_name: "mailserver"
    db_user: "mailuser"
    db_password: "CHANGE_ME_STRONG_PASSWORD"
    db_root_password: "CHANGE_ME_ROOT_PASSWORD"

    roundcube_db_name: "roundcubemail"
    roundcube_db_user: "roundcube"
    roundcube_db_password: "CHANGE_ME_ROUNDCUBE_PASSWORD"

    # ============================================
    # MAIL DOMAIN
    # ============================================
    mail_domain: "example.com"
    mail_hostname: "mail.{{ mail_domain }}"

    # ============================================
    # SSL CERTIFICATES
    # ============================================
    ssl_cert_path: "/etc/ssl/certs/mail.pem"
    ssl_key_path: "/etc/ssl/private/mail.key"
    ssl_self_signed: true

    # ============================================
    # NETWORKS
    # ============================================
    internal_networks:
      - "192.168.1.0/24"
      - "127.0.0.0/8"