---
# Dovecot 2.4 specific configuration
dovecot_version: "2.4"

# Mail location
dovecot_mail_location: "maildir:/var/vmail/%{user|domain}/%{user|username}"
dovecot_mail_plugins: "quota sieve"

# Authentication
dovecot_auth_mechanisms: "plain login"
dovecot_auth_username_transformation: "%{user | lower}"

# SSL/TLS
dovecot_ssl_required: true
dovecot_ssl_min_protocol: "TLSv1.2"
dovecot_ssl_cipher_list: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"

# LMTP
dovecot_lmtp_save_to_detail_mailbox: true

# Quota
dovecot_default_quota: "1G"
dovecot_quota_warning_threshold: "85%"

# Sieve
dovecot_sieve_max_script_size: "1M"
dovecot_sieve_max_actions: 32

# vmail user settings
vmail_uid: 5100
vmail_gid: 5100

# SSL certificate paths
ssl_cert_path: "/etc/ssl/certs/dovecot.pem"
ssl_key_path: "/etc/ssl/private/dovecot.key"

# Configure Firewall
configure_firewall: true 