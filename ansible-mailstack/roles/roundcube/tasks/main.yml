---
- name: Perform Deep Docker Purge (Maintenance Only)
  block:
    - name: Force removal of OS-native Docker packages
      ansible.builtin.apt:
        name: [ docker.io, containerd, runc, docker-doc, docker-compose ]
        state: absent
        purge: yes
      ignore_errors: true

    - name: Purge official Docker CE packages
      ansible.builtin.apt:
        name: [ docker-ce, docker-ce-cli, containerd.io ]
        state: absent
        purge: yes
      ignore_errors: true

    - name: Deep clean Docker filesystem remnants
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/docker
        - /var/lib/containerd
        - /etc/docker
        - /var/run/docker.sock
        - /etc/apt/keyrings/docker.asc
        - /etc/apt/sources.list.d/docker.list
  when: roundcube_docker_purge_all | bool

- name: Install official repository prerequisites
  ansible.builtin.apt:
    name: [ ca-certificates, curl, gnupg ]
    state: present
    update_cache: yes

- name: Setup Docker GPG Keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "a+r"

- name: Add Docker official repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release
      }} stable"
    state: present
    filename: docker

- name: Install Official Docker Engine and Compose Plugin
  ansible.builtin.apt:
    name:
      [
        docker-ce,
        docker-ce-cli,
        containerd.io,
        docker-buildx-plugin,
        docker-compose-plugin,
      ]
    state: present
    update_cache: yes

- name: Ensure Docker service is unmasked and running
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    masked: no
  loop: [ docker.socket, docker.service ]

- name: Prepare Roundcube directories
  ansible.builtin.file:
    path: "/opt/roundcube/{{ item }}"
    state: directory
    owner: "33"
    group: "33"
    mode: "0755"
  loop:
    - ""
    - "data"
    - "logs"

- name: Deploy Dynamic Configs
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/opt/roundcube/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: "config.inc.php.j2", dest: "config.inc.php" }
    - { src: "nginx.conf.j2", dest: "nginx.conf" }
    - { src: "docker-compose.yml.j2", dest: "docker-compose.yml" }
  register: deployment_files

- name: Start Container Roundcube Stack
  ansible.builtin.command:
    cmd: docker compose up -d --force-recreate
    chdir: "/opt/roundcube"
  when: deployment_files is changed
