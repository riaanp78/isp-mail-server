---
# HAProxy version
haproxy_version: "2.8"

# HAProxy stats page - INTERNAL ONLY (never expose to internet)
haproxy_stats_port: 8404
haproxy_stats_user: "admin"
haproxy_stats_password: "CHANGE_ME_HAPROXY_PASSWORD"
haproxy_stats_bind_address: "127.0.0.1" # Only localhost - never expose to network

# Backend configuration
haproxy_backend_maxconn: 4096
haproxy_maxconn_per_ip: 200 # Higher for ISP shared IPs
haproxy_maxconn_rate: 1000

# Health check intervals
haproxy_health_check_interval: "5s"
haproxy_health_check_fall: 3
haproxy_health_check_rise: 2

# Sticky session configuration
haproxy_cookie_name: "MAILSTACK"
haproxy_cookie_dynamic: true

# SSL termination
haproxy_ssl_termination: true
haproxy_ssl_cert_path: "/etc/ssl/haproxy/haproxy.pem"

# Logging
haproxy_log_host: "127.0.0.1"
haproxy_log_port: 514

# Timeouts
haproxy_timeout_connect: "10s"
haproxy_timeout_client: "30s"
haproxy_timeout_server: "30s"
haproxy_timeout_queue: "30s"
haproxy_timeout_tunnel: "1h"

# Firewall - strict rules
configure_firewall: true

# SSH port (always allowed for management)
ssh_port: 22

# External ports (exposed to internet)
haproxy_external_ports:
  - 22 # SSH - CRITICAL: Always allow SSH
  - 25 # SMTP
  - 465 # SMTPS
  - 587 # Submission
  - 143 # IMAP
  - 993 # IMAPS
  - 4190 # ManageSieve
  - 80 # HTTP (Roundcube)
  - 443 # HTTPS (Roundcube)


# Internal ports (only allow from internal networks, never internet)
haproxy_internal_ports:
  - 24 # LMTP (Postfix -> Dovecot)
  - 12345 # SASL (Postfix -> Dovecot)
  - 11334 # Rspamd controller
  - 6379 # Valkey
  - 3310 # ClamAV
  - 8404 # Stats (only localhost)
  - 8405 # HTTP (Prometheus)  

# Internal networks allowed
haproxy_internal_networks:
  - "192.168.1.0/24"
  - "127.0.0.0/8"
  - "10.0.0.0/8" # Add if using internal network
  - "172.16.0.0/12" # Add if using internal network

# Backend balancing algorithms
haproxy_balance_algorithms:
  dovecot: "source" # Sticky by source IP
  roundcube: "roundrobin" # With cookie
  postfix: "roundrobin" # Stateless
  rspamd: "roundrobin" # Stateless
  valkey: "roundrobin" # Stateless
  clamav: "roundrobin" # Stateless
